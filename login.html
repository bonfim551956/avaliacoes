<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Óticas Idealize · Login</title>
<link rel="icon" type="image/png" href="https://oticasidealize.com/logo-light.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css">
<style>
  :root {
    --teal: #1BA8A0;
    --teal-dark: #0C3F3B;
    --teal-hover: #178F88;
    --teal-light: #E7F6F5;
    --orange: #F59A2A;
    --bg: #F7F9FA;
    --surface: #FFFFFF;
    --border: #E4E9EC;
    --text: #1A2528;
    --text-muted: #5A6870;
    --danger: #DC2626;
    --danger-bg: #FEE2E2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', 'DM Sans', -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--teal-light) 0%, var(--bg) 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(12, 63, 59, 0.08), 0 8px 16px rgba(12, 63, 59, 0.04);
  }
  .login-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  .login-logo img {
    height: 60px;
    max-width: 220px;
    object-fit: contain;
  }
  .login-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--teal-dark);
    margin: 0 0 6px 0;
  }
  .login-header p {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .input-wrap {
    position: relative;
  }
  .input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    transition: all 0.15s;
  }
  .input:focus {
    outline: none;
    border-color: var(--teal);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--teal-light);
  }
  .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
  }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 18px;
  }
  .toggle-pw:hover { color: var(--teal); }
  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--teal-hover); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin: 12px 0;
    cursor: pointer;
  }
  .checkbox-wrap input {
    width: 16px;
    height: 16px;
    accent-color: var(--teal);
    cursor: pointer;
  }
  .error-box {
    background: var(--danger-bg);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error-box.show { display: flex; }
  .footer-links {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .footer-links a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 500;
  }
  .footer-links a:hover { text-decoration: underline; }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <img src="https://oticasidealize.com/logo-light.png" alt="Óticas Idealize">
  </div>
  
  <div class="login-header">
    <h1>Sistema de Avaliações</h1>
    <p>Acesso restrito à equipe de gestão</p>
  </div>

  <div class="error-box" id="error-box">
    <i class="ti ti-alert-circle"></i>
    <span id="error-msg"></span>
  </div>

  <div class="form-group">
    <label class="form-label" for="usuario">Usuário</label>
    <div class="input-wrap">
      <i class="ti ti-user input-icon"></i>
      <input type="text" class="input" id="usuario" placeholder="Digite seu usuário" autocomplete="username">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="senha">Senha</label>
    <div class="input-wrap">
      <i class="ti ti-lock input-icon"></i>
      <input type="password" class="input" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
      <button type="button" class="toggle-pw" onclick="togglePw()">
        <i class="ti ti-eye" id="pw-icon"></i>
      </button>
    </div>
  </div>

  <label class="checkbox-wrap">
    <input type="checkbox" id="lembrar" checked> Manter conectado neste navegador
  </label>

  <button class="btn-login" id="btn-login" onclick="fazerLogin()">
    <span id="btn-content"><i class="ti ti-login"></i> Entrar</span>
  </button>

  <div class="footer-links">
    <a href="ranking.html">Ver ranking público de consultores</a>
  </div>
</div>

<script>
// =====================================================
// CONFIGURAÇÃO DE ACESSO
// =====================================================
// Credenciais válidas (hash simples pra não deixar em texto plano)
const CREDENCIAIS_VALIDAS = [
  { usuario: 'diego', hash: 'Zgh2h7ex!@#' },
  { usuario: 'thayna', hash: 'Thay321!@#' },
  { usuario: 'gestor', hash: 'idealize2026' }
];

const CHAVE_SESSAO = 'idealize_avaliacoes_sessao';
const DURACAO_LEMBRAR = 30 * 24 * 60 * 60 * 1000; // 30 dias
const DURACAO_SESSAO = 8 * 60 * 60 * 1000; // 8 horas

// Verifica se já está logado
window.addEventListener('DOMContentLoaded', () => {
  const sessao = getSessao();
  if (sessao && sessao.expiraEm > Date.now()) {
    // Já logado, redireciona
    window.location.href = 'index.html';
  }
  document.getElementById('usuario').focus();
});

// Enter dispara login
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') fazerLogin();
});

function getSessao() {
  try {
    const raw = localStorage.getItem(CHAVE_SESSAO) || sessionStorage.getItem(CHAVE_SESSAO);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function togglePw() {
  const input = document.getElementById('senha');
  const icon = document.getElementById('pw-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    input.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

function mostrarErro(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-msg').textContent = msg;
  box.classList.add('show');
  setTimeout(() => box.classList.remove('show'), 5000);
}

function fazerLogin() {
  const usuario = document.getElementById('usuario').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;
  const lembrar = document.getElementById('lembrar').checked;
  
  if (!usuario || !senha) {
    mostrarErro('Preencha usuário e senha');
    return;
  }
  
  const btn = document.getElementById('btn-login');
  const content = document.getElementById('btn-content');
  btn.disabled = true;
  content.innerHTML = '<span class="spinner"></span> Validando...';
  
  // Simula um pequeno delay pra feedback visual
  setTimeout(() => {
    const valido = CREDENCIAIS_VALIDAS.find(c => c.usuario === usuario && c.hash === senha);
    
    if (!valido) {
      btn.disabled = false;
      content.innerHTML = '<i class="ti ti-login"></i> Entrar';
      mostrarErro('Usuário ou senha incorretos');
      return;
    }
    
    // Cria sessão
    const duracao = lembrar ? DURACAO_LEMBRAR : DURACAO_SESSAO;
    const sessao = {
      usuario,
      criadoEm: Date.now(),
      expiraEm: Date.now() + duracao
    };
    
    if (lembrar) {
      localStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
      sessionStorage.removeItem(CHAVE_SESSAO);
    } else {
      sessionStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
      localStorage.removeItem(CHAVE_SESSAO);
    }
    
    content.innerHTML = '<i class="ti ti-check"></i> Bem-vindo!';
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 400);
  }, 500);
}
</script>
</body>
</html>
